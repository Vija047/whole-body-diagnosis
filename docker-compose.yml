version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./mlruns:/app/mlruns
    environment:
      - PYTHONUNBUFFERED=1
    restart: always

  mlflow:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./mlruns:/app/mlruns
    ports:
      - "5001:5001"
    command: >
      bash -c "pip install mlflow &&
               mlflow ui --host 0.0.0.0 --port 5001"
    restart: always
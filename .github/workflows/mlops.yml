name: MLOps CI/CD/CT Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 0 * * 0'  # Weekly retraining on Sundays
  workflow_dispatch:      # Manual trigger

jobs:
  # 🧪 1. CI (Continuous Integration)
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx pytest-cov

      - name: Run Tests
        env:
          MODELS_READY: "True"
          API_KEY: "dev-key-change-in-production"
        run: |
          pytest tests/ --cov=api --cov-report=xml

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
        continue-on-error: true

  # 🔁 2. CT (Continuous Training) - Simulated for this project
  ct:
    name: Continuous Training
    needs: ci
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Training Pipeline
        run: |
          # In a real scenario, this would pull new data from S3/DVC
          # For now, we use existing data to demonstrate the pipeline
          python src/training/register_models.py
          
      - name: Check for Drift
        run: python src/monitoring/drift_monitor.py
        continue-on-error: true

      - name: Archive Trained Models
        uses: actions/upload-artifact@v3
        with:
          name: new-models
          path: models/*.pkl

  # 🚀 3. CD (Continuous Deployment)
  cd:
    name: Continuous Deployment
    needs: ci
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Render
        # This uses Render's Deploy Hook. 
        # User needs to add RENDER_DEPLOY_HOOK_URL to GitHub Secrets.
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
          else
            echo "RENDER_DEPLOY_HOOK_URL not set, skipping manual trigger."
            echo "Defaulting to Render's automatic GitHub integration."
          fi

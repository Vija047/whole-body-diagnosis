services:
  - type: web
    name: whole-body-diagnosis-api
    env: docker
    plan: free # Can be upgraded to starter/pro for better performance
    region: ohio
    dockerContext: .
    dockerFilePath: Dockerfile
    preDeployCommand: python scripts/seed_db.py
    healthCheckPath: /health

    envVars:
      - key: PORT
        value: 8000
      - key: API_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mlops-db
          property: connectionString
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO

databases:
  - name: mlops-db
    plan: free
    region: ohio
    databaseName: mlops
    user: mlops_user

services:
  # 🧠 ML Ops API (Backend)
  - type: web
    name: whole-body-diagnosis-api
    runtime: docker
    plan: free
    region: ohio
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000
      - key: API_KEY
        value: prod-key-change-this-later
      - key: DATABASE_URL
        fromDatabase:
          name: mlops-db
          property: connectionString
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: ALLOWED_ORIGINS
        value: "*"

  # 💻 React Frontend (Static Site)
  - type: web
    name: whole-body-diagnosis-ui
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://whole-body-diagnosis-api.onrender.com
      - key: VITE_API_KEY
        value: prod-key-change-this-later

databases:
  - name: mlops-db
    plan: free
    region: ohio
    databaseName: mlops
    user: mlops_user

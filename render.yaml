services:
  # 🧠 ML Ops API (Backend)
  - type: web
    name: whole-body-diagnosis-api
    env: docker
    plan: free
    region: ohio
    dockerContext: .
    dockerFilePath: Dockerfile
    preDeployCommand: python scripts/seed_db.py
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 8000
      - key: API_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: mlops-db
          property: connectionString
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: INFO
      - key: ALLOWED_ORIGINS
        value: "*" # Set to your frontend URL after deployment for better security

  # 💻 React Frontend (Static Site)
  - type: web
    name: whole-body-diagnosis-ui
    env: static
    plan: free
    region: ohio
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://whole-body-diagnosis-api.onrender.com # Update if your API service name changes
      - key: VITE_API_KEY
        fromService:
          type: web
          name: whole-body-diagnosis-api
          property: envVar
          envVarKey: API_KEY

databases:
  - name: mlops-db
    plan: free
    region: ohio
    databaseName: mlops
    user: mlops_user
